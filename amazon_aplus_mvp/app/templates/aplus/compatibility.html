<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>{{ global_css | safe }}</style>
</head>
<body>
  <section class="aplus-canvas" style="width: {{ width }}px; height: {{ height }}px;">
    <span class="badge">Compatibility + Use Cases</span>
    <div class="grid two-col" style="margin-top: 40px;">
      <article class="card">
        <h3>Compatibility</h3>
        <ul class="list">
          {% for item in content.compatibility_points %}
          <li>{{ item }}</li>
          {% endfor %}
        </ul>
      </article>
      <article class="card">
        <h3>Use Cases</h3>
        <ul class="list">
          {% for item in content.use_case_points %}
          <li>{{ item }}</li>
          {% endfor %}
        </ul>
      </article>
    </div>
  </section>
</body>
</html>
